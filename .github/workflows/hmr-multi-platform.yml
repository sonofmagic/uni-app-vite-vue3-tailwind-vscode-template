name: HMR Multi-Platform

on:
  pull_request:
    paths:
      - src/**
      - scripts/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - patches/**
      - vite.config.ts
      - eslint.config.mjs
      - tsconfig.json
      - .github/workflows/hmr-multi-platform.yml
  push:
    branches:
      - main
    paths:
      - src/**
      - scripts/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - patches/**
      - vite.config.ts
      - eslint.config.mjs
      - tsconfig.json
      - .github/workflows/hmr-multi-platform.yml
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: h5
            script: build:h5
          - target: mp-weixin
            script: build:mp-weixin
          - target: mp-alipay
            script: build:mp-alipay
          - target: mp-toutiao
            script: build:mp-toutiao

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.target == 'h5'
        run: pnpm lint

      - name: Build
        run: pnpm run ${{ matrix.script }}

  hmr:
    name: HMR mp-weixin
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Iconify content HMR smoke
        run: pnpm run test:hmr:mp-weixin -- --timeout 240000
